database:
  type: "sqlite" # sqlite, mysql
  sqlite-file: "qtrap.db"
  mysql:
    host: "localhost"
    port: 3306
    database: "qtrap"
    username: "root"
    password: ""
    params: "?useSSL=false&autoReconnect=true&characterEncoding=utf8"

defaults:
  trap-health: 2000
  max-trap-health: 2000
  start-level: 1
  bank-balance: 0
  pvp: false
  visit: false

economy:
  require-vault: true
  currency-name: "Milan"

levels:
  1:
    upgrade-price: 0
    max-members: 3
    max-health: 2000
    bank-limit: 1000000
    chunk-limit: 1
  2:
    upgrade-price: 250000
    max-members: 5
    max-health: 3000
    bank-limit: 2500000
    chunk-limit: 2
  3:
    upgrade-price: 750000
    max-members: 8
    max-health: 5000
    bank-limit: 5000000
    chunk-limit: 3
  4:
    upgrade-price: 1500000
    max-members: 12
    max-health: 8000
    bank-limit: 10000000
    chunk-limit: 5

roles:
  OWNER:
    display: "&cSahip"
    permissions: [break, place, interact, chest, invite, kick, role, bank-deposit, bank-withdraw, upgrade, sell, pvp, visit, setspawn, fly]
  MANAGER:
    display: "&6Yonetici"
    permissions: [break, place, interact, chest, invite, kick, bank-deposit, bank-withdraw, setspawn, fly]
  MODERATOR:
    display: "&eModerator"
    permissions: [break, place, interact, chest, bank-deposit, fly]
  MEMBER:
    display: "&aUye"
    permissions: [break, place, interact, chest, bank-deposit]

protection:
  damage-health-on-denied-break: true
  denied-break-damage: 1
  protect-block-break: true
  protect-block-place: true
  protect-interact: true
  protect-containers: true
  allowed-trusted-permissions: [interact, chest, break, place]

fly:
  enabled: true
  require-permission: true
  disable-on-leave: true

market:
  enabled: true
  min-price: 1
  max-price: 1000000000

placeholders:
  enabled: true

holograms:
  enabled: true
  provider: "DecentHolograms"
  name-prefix: "qtrap_"
  y-offset: 3.2
  front-offset: 1.5
  small-font: true
  delete-on-disable: true
  update-on-load: true
  lines:
    - "&fTRAP NUMARASI: &b%id%"
    - "&fTRAP SAHIBI: &b%owner%"
    - "&fTRAP CANI: &b%health%/%max_health%"
    - "&fTRAP BANKASI: &b%bank%"

gui:
  filler:
    material: GRAY_STAINED_GLASS_PANE
    name: " "
  titles:
    main: "TRAP MENUSU"
    list: "TRAPLER (%page%/%pages%)"
    members: "TRAP UYELERI (%page%/%pages%)"
    upgrade: "TRAP YUKSELTME"
    info: "TRAP INFO NO: %id%"
    roles: "ROL BILGI"
    confirm-buy: "SATIN ALMA ONAYI"
    bank: "TRAP BANKASI"
    market: "TRAP PAZARI"
    admin: "QTRAP ADMIN"

sounds:
  success: ENTITY_PLAYER_LEVELUP
  error: BLOCK_NOTE_BLOCK_BASS
  click: UI_BUTTON_CLICK

