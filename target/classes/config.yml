  prefix: "&8[&cQTrap&8] "
  admin-help:
    - "&8&m--------------------------------------------------"
    - "&c&lQTrap &7- Admin Komutları"
    - ""
    - "&f/qtrap reload &8- &7Config ve cache yeniler."
    - "&f/qtrap create <id> <fiyat> &8- &7Bulunduğun chunkta trap oluşturur."
    - "&f/qtrap delete <id> &8- &7Trapi siler."
    - "&f/qtrap info <id> &8- &7Trap detaylarını gösterir."
    - "&f/qtrap setprice <id> <fiyat> &8- &7Satın alma fiyatını ayarlar."
    - "&f/qtrap setowner <id> <oyuncu> &8- &7Trap sahibini değiştirir."
